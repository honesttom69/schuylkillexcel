baseURL = "https://schuylkillexcel.com/"
languageCode = "en-us"
title = "SchuylkillExcel | Tom — Operations Finance & Small Business Consulting"
theme = "hugo-profile"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true

[params]
  title = "SchuylkillExcel"
  description = "Operations finance consulting for small and mid-size businesses"
  #favicon = "/favicon.ico"
  useBootstrapCDN = true
  animate = true

  [params.theme]
    defaultTheme = "light"

  [params.font]
    fontSize = "1rem"
    fontWeight = 400

  [params.hero]
    enable = true
    intro = "Hi, I'm"
    title = "Tom."
    subtitle = "Operations Finance & Small Business Consulting"
    content = """
I spent a decade in operations finance at companies like Fortune Brands and Boston Beer. \
Now I help small businesses get the same caliber systems and reporting \
without the enterprise price tag. Dashboards, ERP, forecasting, AI automation — \
built to actually get used, not collect dust.
"""
    [params.hero.image]
      url = "/images/headshot.jpg"
    [params.hero.bottomImage]
      enable = false
    [params.hero.button]
      enable = true
      name = "Let's Talk"
      url = "#contact"
    [params.hero.socialLinks]
      fontAwesomeIcons = [
        { icon = "fab fa-linkedin", url = "https://www.linkedin.com/in/tom-hinkle-832a1711/" },
      ]

  [params.about]
    enable = true
    title = "About Me"
    image = "/images/headshot.jpg"
    content = """
I've spent a decade in operations finance — financial reporting at a $3B grocery chain, \
demand forecasting for Truly Hard Seltzer at Boston Beer, and currently running ops finance \
for a Fortune Brands manufacturing subsidiary.

I also built an AI assistant on a $0 budget that manages 100+ projects and runs my entire \
productivity system — on an old computer in my basement. I like figuring out how things \
work and making them work better.

Now I'm helping small businesses get the same caliber finance systems and AI automation \
that big companies have, without the big company price tag or complexity.
"""
    [params.about.skills]
      enable = true
      title = "Core Capabilities"
      items = [
        "Power BI Dashboards & Reporting",
        "Financial Forecasting & Cost Analysis",
        "ERP Implementation (SAP, QuickBooks Online, Fulcrum)",
        "Excel Modeling & Automation",
        "Operations Finance & Process Improvement",
        "AI Automation & Workflow Design",
      ]

  [params.experience]
    enable = true
    title = "Experience"

    [[params.experience.items]]
      job = "Operations Finance Manager"
      company = "Fortune Brands Innovations (Solar Innovations)"
      date = "Current"
      content = """
Manage financial operations for manufacturing subsidiary. Lead RBNI accrual remediation, \
cost analysis, and reporting. Build forecasting models and SSRS-based dashboards for \
cross-functional teams.
"""

    [[params.experience.items]]
      job = "Finance / Power BI & Forecasting"
      company = "Boston Beer Company"
      date = "Previous"
      content = """
Built Power BI dashboards for demand forecasting and cost analysis on the Truly Hard Seltzer \
product line. Designed reporting infrastructure for high-growth beverage brand.
"""

    [[params.experience.items]]
      job = "Finance"
      company = "Weis Markets"
      date = "Previous"
      content = """
Financial analysis and reporting for Mid-Atlantic grocery retailer with $3B+ in annual revenue \
and 190+ store locations.
"""

  [params.projects]
    enable = true
    title = "What I Can Do For You"

    [[params.projects.items]]
      title = "Power BI Dashboards & Reporting"
      content = """
Dashboards your team will actually use — not shelf-ware. I connect to your existing \
systems and surface the numbers that matter, so you stop guessing.
"""
      badges = ["Power BI", "SSRS", "SQL", "Excel"]

    [[params.projects.items]]
      title = "Financial Forecasting & Cost Analysis"
      content = """
Sales-to-shipment forecasting, cost modeling, and variance analysis. I build models \
you can actually understand and maintain yourself — not black boxes.
"""
      badges = ["Forecasting", "Cost Analysis", "Excel", "SQL"]

    [[params.projects.items]]
      title = "ERP Implementation & QBO Optimization"
      content = """
Whether you're outgrowing spreadsheets or your current ERP isn't set up right, I help \
you pick the right tool and configure it so it actually works for your business.
"""
      badges = ["ERP", "QuickBooks Online", "Fulcrum", "SAP"]

    [[params.projects.items]]
      title = "Operations Finance Process Improvement"
      content = """
I look at how your finance workflows actually run, find what's slowing you down, and fix it. \
AP/AR cleanup, accrual management, reporting automation.
"""
      badges = ["Process Improvement", "AP/AR", "Accruals", "Automation"]

    [[params.projects.items]]
      title = "Product Costing — Services & Goods"
      content = """
Know what your products and services actually cost to deliver. I build costing \
models for manufactured goods, service engagements, and blended offerings — \
so you can price with confidence and spot margin leaks before they hurt.
"""
      badges = ["Product Costing", "COGS", "Margin Analysis", "Pricing"]

    [[params.projects.items]]
      title = "AI Automation & Workflow Design"
      content = """
Practical AI that does real work — not hype. I build automated workflows, \
reporting pipelines, and AI assistants that save you hours every week.
"""
      badges = ["AI", "Automation", "Workflow", "Productivity"]

  [params.contact]
    enable = true
    title = "Get In Touch"
    content = """
Whether you need a one-time project or ongoing fractional finance support, \
I'd love to hear about what you're working on.
"""
    btnName = "Connect on LinkedIn"
    btnLink = "https://www.linkedin.com/in/tom-hinkle-832a1711/"

  [params.footer]
    [params.footer.recentPosts]
      enable = false
    [params.footer.socialNetworks]
      linkedin = "https://www.linkedin.com/in/tom-hinkle-832a1711/"

[menus]
  [[menus.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blogs"
    weight = 35
