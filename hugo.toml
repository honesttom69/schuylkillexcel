baseURL = "https://schuylkillexcel.com/"
languageCode = "en-us"
title = "SchuylkillExcel | Tom — Operations Finance & Small Business Consulting"
theme = "hugo-profile"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true

[params]
  title = "SchuylkillExcel"
  description = "Operations finance consulting for small and mid-size businesses"
  favicon = "/favicon.ico"
  useBootstrapCDN = true
  animate = true

  [params.theme]
    defaultTheme = "light"

  [params.font]
    fontSize = "1rem"
    fontWeight = 400

  [params.hero]
    enable = true
    intro = "Hi, I'm"
    title = "Tom."
    subtitle = "Operations Finance & Small Business Consulting"
    content = """
I help small and mid-size businesses make better decisions with better numbers. \
From Power BI dashboards to ERP implementations, I bring Fortune 500 finance discipline \
to companies that need it most — without the Fortune 500 price tag.
"""
    [params.hero.image]
      url = "/images/headshot.jpg"
    [params.hero.bottomImage]
      enable = false
    [params.hero.button]
      enable = true
      name = "Let's Talk"
      url = "#contact"
    [params.hero.socialLinks]
      fontAwesomeIcons = [
        { icon = "fab fa-linkedin", url = "https://www.linkedin.com/in/tom-hinkle-832a1711/" },
      ]

  [params.about]
    enable = true
    title = "About Me"
    image = "/images/headshot.jpg"
    content = """
I'm an Operations Finance Manager with experience spanning Fortune Brands Innovations, \
Boston Beer Company, and Weis Markets. I specialize in turning messy financial data into \
clear, actionable insights — whether that's building Power BI dashboards, implementing \
ERP systems, or designing forecasting models that actually work.

I'm a Dale Carnegie Communication Graduate who believes the best financial analysis is \
the kind that everyone in the room can understand.

Currently building an independent consulting practice focused on small and mid-size businesses \
that need real finance infrastructure without a full-time CFO.
"""
    [params.about.skills]
      enable = true
      title = "Core Capabilities"
      items = [
        "Power BI Dashboards & Reporting",
        "Financial Forecasting & Cost Analysis",
        "ERP Implementation (SAP, QuickBooks Online, Fulcrum)",
        "SAP Analytics Cloud (SAC)",
        "Operations Finance & Process Improvement",
        "Excel Modeling & Automation",
      ]

  [params.experience]
    enable = true
    title = "Experience"

    [[params.experience.items]]
      job = "Operations Finance Manager"
      company = "Fortune Brands Innovations (Solar Innovations)"
      date = "Current"
      content = """
Manage financial operations for manufacturing subsidiary. Lead RBNI accrual remediation, \
cost analysis, and reporting. Build forecasting models and SSRS-based dashboards for \
cross-functional teams.
"""

    [[params.experience.items]]
      job = "Finance / Power BI & Forecasting"
      company = "Boston Beer Company"
      date = "Previous"
      content = """
Built Power BI dashboards for demand forecasting and cost analysis on the Truly Hard Seltzer \
product line. Designed reporting infrastructure for high-growth beverage brand.
"""

    [[params.experience.items]]
      job = "Finance"
      company = "Weis Markets"
      date = "Previous"
      content = """
Financial analysis and reporting for Mid-Atlantic grocery retailer with $3B+ in annual revenue \
and 190+ store locations.
"""

  [params.projects]
    enable = true
    title = "What I Can Do For You"

    [[params.projects.items]]
      title = "Power BI Dashboards & Reporting"
      content = """
Transform raw data into dashboards your team will actually use. I build reporting \
infrastructure that connects to your existing systems and surfaces the metrics that matter.
"""
      badges = ["Power BI", "SSRS", "SQL", "Excel"]

    [[params.projects.items]]
      title = "Financial Forecasting & Cost Analysis"
      content = """
Sales-to-shipment forecasting, cost modeling, and variance analysis. I design models \
that are accurate, maintainable, and understandable — not black boxes.
"""
      badges = ["Forecasting", "Cost Analysis", "Excel", "SAC"]

    [[params.projects.items]]
      title = "ERP Implementation & QBO Optimization"
      content = """
From evaluating ERP platforms to configuring QuickBooks Online for growing businesses. \
I identify configuration gaps and build processes that scale.
"""
      badges = ["ERP", "QuickBooks Online", "Fulcrum", "SAP"]

    [[params.projects.items]]
      title = "Operations Finance Process Improvement"
      content = """
Audit your current finance workflows, identify bottlenecks, and implement improvements. \
AP/AR optimization, accrual management, and reporting automation.
"""
      badges = ["Process Improvement", "AP/AR", "Accruals", "Automation"]

  [params.contact]
    enable = true
    title = "Get In Touch"
    content = """
Whether you need a one-time project or ongoing fractional finance support, \
I'd love to hear about what you're working on.
"""
    btnName = "Email Me"
    btnLink = "mailto:tom@schuylkillexcel.com"

  [params.footer]
    [params.footer.recentPosts]
      enable = false
    [params.footer.socialNetworks]
      linkedin = "https://www.linkedin.com/in/tom-hinkle-832a1711/"

[menus]
  [[menus.main]]
    identifier = "about"
    name = "About"
    url = "/#about"
    weight = 10
  [[menus.main]]
    identifier = "experience"
    name = "Experience"
    url = "/#experience"
    weight = 20
  [[menus.main]]
    identifier = "services"
    name = "Services"
    url = "/#projects"
    weight = 30
  [[menus.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blogs"
    weight = 35
  [[menus.main]]
    identifier = "contact"
    name = "Contact"
    url = "/#contact"
    weight = 40
